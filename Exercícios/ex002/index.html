<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p> Você pode escrever <br>
        um parágrafo de <br>
        qualquer jeito. <br>
        Basta colocar tudo <br>
        no meio do par de tags <br>
        &lt;p&gt; e &lt;/p&gt;
    </p>

    <p>
        Se precisar quebrar o texto em algum lugar específico <br> como esse, você pode usqar a tag &lt;br&gt; <!-- LESS THAN / GREATER THAN -->
    </p>

    <p>Vamos adicionar alguns símbolos especiais:
        &reg;
        &copy;
        &trade;
        &euro;
        &pound;
        &yen;
        &cent;
        &Delta;
        &uarr;
        </p>

        <p>Vamos adicionar alguns emoji:
           &#x1F913;
           &#x1F596;     
        </p>
</body>
</html>
